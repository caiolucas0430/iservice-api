name: Validacao de PR (Lint e Build)

on:
  pull_request:
    branches: ["main", "dev"]

jobs:
  validar-codigo:
    name: Lint e Build Checker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Verificar padrões (Lint)
        run: npm run lint

      - name: Executar Testes Unitários e Cobertura
        run: npm run test:cov

      - name: Verificar compilação (Build)
        run: npm run build

      - name: Analisar no SonarQube
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: 'http://labens.dct.ufrn.br/sonarqube'