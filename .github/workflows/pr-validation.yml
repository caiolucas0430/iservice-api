name: Validacao de PR (Lint e Build)

on:
  pull_request:
    branches: ["main", "dev"]

jobs:
  validar-codigo:
    name: Lint e Build Checker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Verificar padrões (Lint)
        run: npm run lint

      - name: Executar Testes Unitários
        run: npm run test

      - name: Verificar compilação (Build)
        run: npm run build